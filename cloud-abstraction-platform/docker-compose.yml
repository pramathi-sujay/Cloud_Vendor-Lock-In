version: '3.8'

services:
  backend:
    build: ./backend
    container_name: cloud-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
      - backend-db:/backend/db
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: cloud-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  backend-db:
